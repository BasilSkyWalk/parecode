name: Bug report
description: Something in Parecode behaves incorrectly.
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences. What happened, what did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Exact commands, MCP tool call, or code snippet. Smallest case that still fails.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
    validations:
      required: true
  - type: input
    id: parecode-version
    attributes:
      label: Parecode version
      placeholder: e.g. 0.1.2 (output of `parecode --version`)
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: e.g. v20.11.1
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x64)
        - Linux (arm64)
        - Windows (x64)
        - Other
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: "`parecode doctor` output"
      description: Paste the full output if available.
      render: shell
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Stderr, session log excerpts, MCP host logs. Redact paths/secrets as needed.
      render: shell
