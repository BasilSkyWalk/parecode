name: Feature request
description: Propose a new capability or behavior change.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do? What gets in the way today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Concrete API, flag, tool input/output, or behavior you'd like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried, other designs you weighed.
  - type: textarea
    id: scope
    attributes:
      label: Scope notes
      description: Does this touch the tool schema, CLI flags, or on-disk formats? Any backward-compatibility concerns?
