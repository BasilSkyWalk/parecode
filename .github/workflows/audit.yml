name: Weekly npm audit

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  audit:
    name: npm audit --audit-level=high
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
      - run: npm ci

      - name: Run npm audit (report)
        id: audit_report
        run: |
          set +e
          npm audit --audit-level=high
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Attempt npm audit fix
        if: steps.audit_report.outputs.exit_code != '0'
        run: npm audit fix --audit-level=high || true

      - name: Create Pull Request
        if: steps.audit_report.outputs.exit_code != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(deps): weekly npm audit fix"
          signoff: true
          branch: chore/npm-audit-weekly
          delete-branch: true
          title: "chore(deps): weekly npm audit fix"
          body: |
            Automated weekly `npm audit --audit-level=high` run found high-severity advisories.

            This PR contains the result of `npm audit fix` (non-breaking patches only). If the diff is empty, the advisories require manual intervention — check the workflow logs and resolve by hand.
          labels: dependencies, security

      - name: Fail job if audit found unresolved issues
        if: steps.audit_report.outputs.exit_code != '0'
        run: |
          echo "::warning::npm audit reported high-severity advisories. See PR or logs."
          exit 1
