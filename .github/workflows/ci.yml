name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Node ${{ matrix.node-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: Install ripgrep (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Install ripgrep (macOS)
        if: runner.os == 'macOS'
        run: brew install ripgrep
      - name: Install ripgrep (Windows)
        if: runner.os == 'Windows'
        run: choco install ripgrep -y
      - name: Verify ripgrep
        run: rg --version
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run

  size-check:
    name: Tarball Size Limit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Check tarball size (Max 30MB)
        run: |
          npm pack
          TARBALL=$(ls *.tgz)
          SIZE=$(stat -c%s "$TARBALL")
          MAX_SIZE=$((30 * 1024 * 1024))
          echo "Tarball size: $SIZE bytes"
          if [ $SIZE -gt $MAX_SIZE ]; then
            echo "::error::Tarball size ($SIZE bytes) exceeds the 30MB limit ($MAX_SIZE bytes)"
            exit 1
          fi
