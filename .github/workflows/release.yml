name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack Tarball
        run: |
          npm pack
          sha256sum *.tgz > checksums.txt

      - name: Extract Release Notes
        run: |
          export VERSION=${GITHUB_REF_NAME#v}
          node -e "
          const fs = require('fs');
          try {
            const content = fs.readFileSync('CHANGELOG.md', 'utf8');
            const regex = new RegExp('^## \\\\[?' + process.env.VERSION + '\\\\]?[\\\\s\\\\S]*?(?=\\\n## \\\\[|$)', 'm');
            const match = content.match(regex);
            const notes = match ? match[0].split('\n').slice(1).join('\n').trim() : 'No release notes found for version ' + process.env.VERSION;
            fs.writeFileSync('release-notes.md', notes);
          } catch (e) {
            fs.writeFileSync('release-notes.md', 'Error extracting release notes: ' + e.message);
          }
          "

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            *.tgz
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
